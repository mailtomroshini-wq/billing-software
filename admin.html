<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Menu — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">⚙️</span>
      <h1>Admin Panel</h1>
    </div>
    <nav class="site-nav">
      <a href="index.html">Billing</a>
      <a href="admin.html" class="active">Manage Menu</a>
      <a href="reports.html">Reports</a>
    </nav>
  </header>

  <!-- Login -->
  <section id="login-section" class="page-container">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required placeholder="Enter admin password">
        </div>
        <p id="login-error" class="form-error"></p>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
    
    </div>
  </section>

  <!-- Admin Content -->
  <section id="admin-section" class="page-container" hidden>
    <div class="admin-toolbar">
      <button type="button" id="publish-btn" class="btn btn-primary">Publish to Vercel</button>
      <button type="button" id="export-btn" class="btn btn-secondary">Export Backup</button>
      <button type="button" id="import-btn" class="btn btn-secondary">Import Backup</button>
      <input type="file" id="import-file" accept=".json" hidden>
      <button type="button" id="logout-btn" class="btn btn-danger">Logout</button>
    </div>
    <p class="deploy-hint">After editing menu images, click <strong>Publish to Vercel</strong> → extract ZIP into project → push to GitHub. Vercel will redeploy with updated photos.</p>

    <div class="card">
      <h2>Add Menu Item</h2>
      <form id="add-item-form">
        <div class="form-row">
          <div class="form-group">
            <label for="add-name">Name</label>
            <input type="text" id="add-name" required placeholder="e.g. Idly">
          </div>
          <div class="form-group">
            <label for="add-price">Price (₹)</label>
            <input type="number" id="add-price" required min="1" step="1" placeholder="40">
          </div>
        </div>
        <div class="form-group">
          <label for="add-category">Category</label>
          <select id="add-category">
            <option value="Breakfast">Breakfast</option>
            <option value="Rice">Rice</option>
            <option value="Snacks">Snacks</option>
            <option value="Beverages">Beverages</option>
          </select>
        </div>
        <div class="form-group">
          <label for="add-image">Image (optional, max 2 MB)</label>
          <input type="file" id="add-image" accept="image/*">
        </div>
        <p id="add-error" class="form-error"></p>
        <button type="submit" class="btn btn-primary">Add Item</button>
      </form>
    </div>

    <div class="card">
      <h2>Menu Items</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="menu-table-body"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Settings</h2>
      <form id="settings-form">
        <div class="form-group">
          <label for="setting-name">Restaurant Name</label>
          <input type="text" id="setting-name" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="setting-upi">UPI ID</label>
            <input type="text" id="setting-upi" required placeholder="mailtomyogesh-3@oksbi">
          </div>
          <div class="form-group">
            <label for="setting-payee">UPI Payee Name</label>
            <input type="text" id="setting-payee" required>
          </div>
        </div>
        <div class="form-group">
          <label for="setting-password">New Admin Password (leave blank to keep current)</label>
          <input type="password" id="setting-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Save Settings</button>
      </form>
    </div>
  </section>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal">
    <div class="modal-content" style="text-align:left;max-width:440px;">
      <h2>Edit Item</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <img id="edit-preview" class="edit-preview" src="images/placeholder.svg" alt="Preview">
        <div class="form-group">
          <label for="edit-name">Name</label>
          <input type="text" id="edit-name" required>
        </div>
        <div class="form-group">
          <label for="edit-price">Price (₹)</label>
          <input type="number" id="edit-price" required min="1" step="1">
        </div>
        <div class="form-group">
          <label for="edit-category">Category</label>
          <select id="edit-category">
            <option value="Breakfast">Breakfast</option>
            <option value="Rice">Rice</option>
            <option value="Snacks">Snacks</option>
            <option value="Beverages">Beverages</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-image">New Image (optional)</label>
          <input type="file" id="edit-image" accept="image/*">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="edit-active"> Active (visible on billing page)
          </label>
        </div>
        <div style="display:flex;gap:0.5rem;margin-top:1rem;">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="button" id="close-edit-modal" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div id="admin-toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/deploy-sync.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
