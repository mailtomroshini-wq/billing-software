<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monthly Sales Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">📊</span>
      <h1>Sales Reports</h1>
    </div>
    <nav class="site-nav">
      <a href="index.html">Billing</a>
      <a href="admin.html">Manage Menu</a>
      <a href="reports.html" class="active">Reports</a>
    </nav>
  </header>

  <!-- Login -->
  <section id="login-section" class="page-container">
    <div class="login-box">
      <h2>Admin Login</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required placeholder="Enter admin password">
        </div>
        <p id="login-error" class="form-error"></p>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
    </div>
  </section>

  <!-- Reports -->
  <section id="reports-section" class="page-container" hidden>
    <div class="admin-toolbar">
      <button type="button" id="export-pdf-btn" class="btn btn-primary">Export PDF</button>
      <button type="button" id="export-csv-btn" class="btn btn-secondary">Export CSV</button>
      <button type="button" id="logout-btn" class="btn btn-danger">Logout</button>
    </div>

    <div class="report-filters">
      <div class="form-group">
        <label for="report-month">Month</label>
        <select id="report-month"></select>
      </div>
      <div class="form-group">
        <label for="report-year">Year</label>
        <select id="report-year"></select>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card stat-card-sales">
        <div class="stat-icon">₹</div>
        <div class="stat-value" id="stat-sales">₹0.00</div>
        <div class="stat-label">Total Sales</div>
      </div>
      <div class="stat-card stat-card-orders">
        <div class="stat-icon">📋</div>
        <div class="stat-value" id="stat-orders">0</div>
        <div class="stat-label">Orders</div>
      </div>
      <div class="stat-card stat-card-top">
        <div class="stat-icon">⭐</div>
        <div class="stat-value stat-value-sm" id="stat-top-item">—</div>
        <div class="stat-label">Top Item</div>
      </div>
    </div>

    <div class="card report-table-card" id="report-export-area">
      <h2>Order Details</h2>
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Order ID</th>
            <th>Items</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="report-table-body"></tbody>
      </table>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/deploy-sync.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
